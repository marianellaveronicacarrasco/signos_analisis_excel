name: Actualizar datos Signos

on:
  schedule:
    - cron: '0 3 * * *'   # Todos los días 03:00 UTC
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl gspread google-auth

      - name: Ejecutar extracción
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python extraccion.py

      - name: Commit y push CSV actualizados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.csv
          git commit -m "Actualización automática de datos" || echo "Sin cambios"
          git push
